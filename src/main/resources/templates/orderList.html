<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Daftar Order</title></head>
<body>
<h2>Hasil Pencarian Order</h2>
<table border="1">
    <tr>
        <th>Order ID</th>
        <th>Author</th>
        <th>Status</th>
        <th>Aksi</th>
    </tr>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.author}"></td>
        <td th:text="${order.status}"></td>
        <td>
            <a th:href="@{/order/pay/{id}(id=${order.id})}">Pay Order</a>
        </td>
    </tr>
</table>
<br>
<a th:href="@{/order/history}">Kembali</a>
</body>
</html>
